<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Subtle star dots -->
  <circle cx="30" cy="40" r="1.5" fill="#7dd3fc" opacity="0.4"/>
  <circle cx="155" cy="30" r="1" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="45" cy="155" r="1" fill="#7dd3fc" opacity="0.25"/>
  <circle cx="165" cy="160" r="1.5" fill="#7dd3fc" opacity="0.35"/>
  <circle cx="90" cy="25" r="1" fill="#7dd3fc" opacity="0.2"/>
  <!-- $ symbol -->
  <text x="96" y="128" font-family="system-ui,sans-serif" font-size="90" font-weight="900" fill="url(#accent)" text-anchor="middle">$</text>
</svg>